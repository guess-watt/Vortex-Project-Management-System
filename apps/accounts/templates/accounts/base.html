<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Vortex{% endblock %}</title>
    
    {% load static %}
    <!-- Theme initialization script - MUST be before CSS to prevent flash -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            if (theme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
        })();
    </script>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/dark-theme.css' %}">
    <link rel="stylesheet" href="{% static 'css/toast-system.css' %}">
    <link rel="stylesheet" href="{% static 'css/health-score.css' %}">
    
    <style>
        /* Task completion effects styles */
        .task-success-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            z-index: 10000;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .task-success-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        
        .task-completed-animation {
            animation: taskCompleteScale 0.6s ease;
        }
        
        @keyframes taskCompleteScale {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            }
            100% {
                transform: scale(1);
            }
        }
        
        /* Ensure confetti canvas is fullscreen and doesn't block interactions */
        canvas {
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'accounts:dashboard' %}">Vortex</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:dashboard' %}">Dashboard</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'projects:project_list' %}">Projects</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:toast_demo' %}">
                                <i class="bi bi-bell"></i> Toast Demo
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:profile' %}">Profile</a>
                        </li>
                        <li class="nav-item">
                            <button id="sound-toggle" class="nav-link border-0 bg-transparent" aria-label="Toggle sound">
                                🔔
                            </button>
                        </li>
                        <li class="nav-item">
                            <button id="theme-toggle" class="nav-link border-0 bg-transparent" aria-label="Toggle theme">
                                🌙
                            </button>
                        </li>
                        <li class="nav-item">
                            <span class="nav-link">{{ user.username }}</span>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <button id="theme-toggle" class="nav-link border-0 bg-transparent" aria-label="Toggle theme">
                                🌙
                            </button>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:login' %}">Login</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'accounts:register' %}">Register</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hidden div to store Django messages as JSON for toast system -->
    {% load json_tags %}
    <div id="django-messages" data-messages="{{ messages|safe_json }}" style="display: none;"></div>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="{% static 'js/theme.js' %}"></script>
    <script src="{% static 'js/toast-system.js' %}"></script>
    <script src="{% static 'js/task-effects.js' %}"></script>
</body>
</html>
